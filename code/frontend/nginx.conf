server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Frontend React (SPA) ---
    # Toute route inconnue renvoie vers index.html (nécessaire pour React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Proxy API vers le backend ---
    # Le nom "backend" correspond au nom du service dans docker-compose.yml
    # Pas de "/" final après le port : ton backend Express monte déjà ses routes
    # sous /api (ex: app.use('/api/abonnements', ...)), donc on garde le préfixe /api
    # tel quel en le transmettant au backend.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Utile si tu as des webhooks Stripe ou de l'upload de fichiers un peu lourds
        client_max_body_size 10M;
    }

    # --- Webhook Stripe (si route spécifique en dehors de /api) ---
    # Décommente et adapte si ton webhook Stripe n'est pas sous /api/
    # location /webhook/ {
    #     proxy_pass http://backend:3000/webhook/;
    #     proxy_set_header Host $host;
    # }

    # Cache long pour les assets statiques buildés par Vite (JS/CSS hashés)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
