services:

  # --- Base de données PostgreSQL ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-app_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-app_db}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ../Documents/sqlcyna.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/scripts/seed-catalogue.sql:/docker-entrypoint-initdb.d/02-seed-catalogue.sql
      - ./backend/scripts/migration-stripe-customer.sql:/docker-entrypoint-initdb.d/03-migration-stripe.sql
    ports:
      - "5432:5432"
    networks:
      - app_network
      - monitoring_net

  # --- Backend Node/Express ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-app_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-app_db}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      - db
    ports:
      - "9464:3000"
    networks:
      - app_network
      - monitoring_net

  # --- Frontend React/Vite servi par Nginx (+ proxy API) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - app_network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER:-app_user}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-app_db}?sslmode=disable
    depends_on:
      - db
    ports:
      - "9187:9187"
    networks:
      - monitoring_net

networks:
  app_network:
    driver: bridge
  monitoring_net:
    external: true

volumes:
  db_data:
